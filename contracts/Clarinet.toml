[project]
name = "bityield-contracts"
description = "YieldRouter contract and supporting traits/tokens for BitYield"
authors = []
telemetry = false
cache_dir = ".cache"
requirements = []

[contracts.sip-010-trait]
path = "contracts/sip-010-trait.clar"
clarity_version = 2
epoch = 2.5

[contracts.mock-sbtc-token]
path = "contracts/mock-sbtc-token.clar"
clarity_version = 2
epoch = 2.5
depends_on = ["sip-010-trait"]

[contracts.yield-strategy-trait]
path = "contracts/yield-strategy-trait.clar"
clarity_version = 2
epoch = 2.5
depends_on = ["sip-010-trait"]

[contracts.mock-yield-strategy]
path = "contracts/mock-yield-strategy.clar"
clarity_version = 2
epoch = 2.5
depends_on = ["yield-strategy-trait", "sip-010-trait"]

[contracts.zest-strategy]
path = "contracts/zest-strategy.clar"
clarity_version = 2
epoch = 2.5
depends_on = ["yield-strategy-trait", "sip-010-trait"]

[contracts.hermetica-strategy]
path = "contracts/hermetica-strategy.clar"
clarity_version = 2
epoch = 2.5
depends_on = ["yield-strategy-trait", "sip-010-trait"]

[contracts.dual-stacking-strategy]
path = "contracts/dual-stacking-strategy.clar"
clarity_version = 2
epoch = 2.5
depends_on = ["yield-strategy-trait", "sip-010-trait"]

[contracts.yield-router]
path = "contracts/yield-router.clar"
clarity_version = 2
epoch = 2.5
depends_on = ["sip-010-trait", "yield-strategy-trait"]

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
